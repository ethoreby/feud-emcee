<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <title>Emcee Master</title>
    <style>
        :root { --gold: #ffd700; --blue: #0056b3; --red: #ff4444; --dark: #121212; --gray: #2a2a2a; }
        body { font-family: sans-serif; background: var(--dark); color: white; margin: 0; display: flex; flex-direction: column; 
        	/* Use 'vh' for compatibility, but 'svh' (small viewport height) is better for mobile Chrome */
    		height: 100vh; 
		    height: 100svh; 
		    padding-bottom: env(safe-area-inset-bottom); /* Fixes bezel/notch overlap */
		    overflow: hidden; 
		    user-select: none; 
		    -webkit-user-select: none;
		}
		
		/* Disables pull-to-refresh gesture in Chrome */
		html, body {
		    overscroll-behavior-y: contain;
		}
        
        /* Layout */
        .score-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #000; border-bottom: 2px solid #333; }
        .score-box { text-align: center; flex: 1; }
        .score-val { font-size: 3rem; font-weight: bold; color: var(--gold); line-height: 1; }
        .fam-label { font-size: 0.8rem; color: #aaa; margin-top: 5px; }
        
        .pot-box { border: 3px solid var(--gold); padding: 10px; border-radius: 12px; min-width: 90px; text-align: center; background: #1a1a1a; }
        .pot-val { font-size: 2.2rem; font-weight: bold; }
        
        .arrow-btn { background: var(--gold); border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 1.5rem; font-weight: bold; margin: 0 10px; }

        .strikes-container { display: flex; justify-content: space-around; padding: 20px 10px; }
        .strike-group { display: flex; gap: 8px; background: var(--gray); padding: 15px; border-radius: 10px; min-width: 120px; justify-content: center; }
        .strike-slot { font-size: 2rem; font-weight: 900; color: #444; width: 30px; text-align: center; }
        .strike-active { color: var(--red); text-shadow: 0 0 10px rgba(255,0,0,0.5); }

        .undo-container { text-align: center; margin-top: 20px; }
        .undo-btn { background: #444; color: #ccc; border: none; padding: 12px 40px; border-radius: 25px; font-size: 1rem; }
        .undo-btn:disabled { opacity: 0.2; }

        /* Navigation & Overlays */
        .footer { 
		    margin-top: auto; 
		    display: flex; 
		    background: #1a1a1a;
		    padding-bottom: env(safe-area-inset-bottom); /* Pushes buttons above the home bar */
		    border-top: 1px solid #333;
		}
        .nav-btn { flex: 1; padding: 20px; background: #1a1a1a; color: #888; border: none; font-weight: bold; }
        
        .overlay { position: fixed; inset: 0; background: var(--dark); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .sfx-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 90%; }
        .big-btn { padding: 30px 10px; font-size: 1.2rem; background: var(--blue); color: white; border: none; border-radius: 10px; }

        /* Pressing effect for all buttons */
		button:active, .pot-box:active, .strike-group:active {
		    transform: scale(0.96);
		    filter: brightness(0.8);
		    transition: transform 0.05s;
		}

		/* Specific feedback for the Pot Box and Strike groups since they are <div> elements */
		.pot-box, .strike-group, button {
		    transition: transform 0.1s;
		    cursor: pointer;
		    -webkit-tap-highlight-color: transparent; /* Removes the blue box on mobile */
		}
        
        .cooldown { pointer-events: none; opacity: 0.7; }
    </style>
</head>
<body>

    <div id="main-screen" style="display: flex; flex-direction: column; height: 100%;">
        <div class="score-row">
            <div class="score-box">
                <div id="scoreA" class="score-val">0</div>
                <div class="fam-label">FAM A</div>
            </div>
            <button class="arrow-btn" onclick="transferPot('A')">←</button>
            <div class="pot-box" onclick="openPotModal()">
                <div id="pot" class="pot-val">0</div>
                <div style="font-size: 0.7rem; color: var(--gold)">POT</div>
            </div>
            <button class="arrow-btn" onclick="transferPot('B')">→</button>
            <div class="score-box">
                <div id="scoreB" class="score-val">0</div>
                <div class="fam-label">FAM B</div>
            </div>
        </div>

        <div class="strikes-container">
            <div class="strike-group" onclick="addStrike('A')">
                <div id="sA1" class="strike-slot">X</div>
                <div id="sA2" class="strike-slot">X</div>
                <div id="sA3" class="strike-slot">X</div>
            </div>
            <div class="strike-group" onclick="addStrike('B')">
                <div id="sB1" class="strike-slot">X</div>
                <div id="sB2" class="strike-slot">X</div>
                <div id="sB3" class="strike-slot">X</div>
            </div>
        </div>

        <div class="undo-container">
            <button id="undoBtn" class="undo-btn" onclick="undo()" disabled>UNDO</button>
        </div>

        <div class="footer">
            <button class="nav-btn" onclick="showScreen('sfx-screen')">SOUND BOARD</button>
            <button class="nav-btn" onclick="showScreen('settings-screen')">SETTINGS</button>
        </div>
    </div>

	<!-- SFX Screen -->
	<div id="sfx-screen" class="overlay">
	    <h2 style="margin-bottom: 20px;">Sound Board</h2>
	    <div class="sfx-grid">
	        <button class="big-btn" onclick="play('theme')">Theme</button>
	        <button class="big-btn" onclick="play('ding')">Ding</button>
	        <button class="big-btn" onclick="play('strike')">Strike</button>
	        <button class="big-btn" onclick="play('roundWin')">Win</button>
	    </div>
	    <!-- New Stop Button -->
	    <button class="big-btn" style="background: var(--red); width: 90%; margin-top: 15px;" onclick="stopAllSounds()">
	        STOP ALL SOUNDS
	    </button>
	    <button class="undo-btn" style="margin-top: 30px;" onclick="showScreen('main-screen')">BACK</button>
	</div>

    <!-- Settings Screen -->
    <div id="settings-screen" class="overlay">
        <h2>Settings</h2>
        <button class="big-btn" style="width: 80%; margin-bottom: 20px;" onclick="toggleMute()" id="muteBtn">MUTE: OFF</button>
        <button class="big-btn" style="width: 80%; background: var(--red);" onclick="fullReset()">RESET GAME</button>
        <button class="undo-btn" style="margin-top: 40px;" onclick="showScreen('main-screen')">BACK</button>
    </div>

    <!-- Pot Input Modal -->
	<div id="pot-modal" class="overlay">
	    <div style="background: var(--gray); padding: 30px; border-radius: 15px; text-align: center; width: 80%;">
	        <h2 style="margin-top: 0;">Add to Pot</h2>
	        <input type="number" id="pot-input" 
	               style="width: 100%; font-size: 2rem; text-align: center; margin-bottom: 20px; border-radius: 8px; border: none; padding: 10px;">
	        <div style="display: flex; gap: 10px;">
	            <button class="big-btn" style="flex: 1; background: var(--red);" onclick="closePotModal()">CANCEL</button>
	            <button class="big-btn" style="flex: 1;" onclick="submitPot()">ADD</button>
	        </div>
	    </div>
	</div>

    <script>
        // Initialization: Try to load from localStorage, otherwise use default
		const defaultState = { scoreA: 0, scoreB: 0, pot: 0, strikesA: 0, strikesB: 0, muted: false };
		let state = JSON.parse(localStorage.getItem('feudGameState')) || defaultState;
		let history = null;
		let cooldown = false;

		const sounds = {
		    theme: new Audio('soundEffects/theme.mp3'),
		    ding: new Audio('soundEffects/ding.mp3'),
		    strike: new Audio('soundEffects/strike.mp3'),
		    roundWin: new Audio('soundEffects/roundWin.mp3')
		};

		// --- PERSISTENCE & UI ---

		function saveAndRefresh() {
		    localStorage.setItem('feudGameState', JSON.stringify(state));
		    updateUI();
		}

		function updateUI() {
		    document.getElementById('scoreA').innerText = state.scoreA;
		    document.getElementById('scoreB').innerText = state.scoreB;
		    document.getElementById('pot').innerText = state.pot;
		    document.getElementById('undoBtn').disabled = !history;
		    document.getElementById('muteBtn').innerText = `MUTE: ${state.muted ? 'ON' : 'OFF'}`;

		    for(let i=1; i<=3; i++) {
		        document.getElementById(`sA${i}`).className = `strike-slot ${state.strikesA >= i ? 'strike-active' : ''}`;
		        document.getElementById(`sB${i}`).className = `strike-slot ${state.strikesB >= i ? 'strike-active' : ''}`;
		    }
		}

		// --- NAVIGATION & BACK BUTTON ---

		function showScreen(id) {
		    document.querySelectorAll('.overlay').forEach(s => s.style.display = 'none');
		    if(id !== 'main-screen') {
		        document.getElementById(id).style.display = 'flex';
		        // Add a fake history state so the Android back button has something to "pop"
		        window.history.pushState({screen: id}, "");
		    }
		}

		// Listen for the Android Back Button
		window.onpopstate = function(event) {
		    // If user presses back, hide all overlays and show main screen
		    document.querySelectorAll('.overlay').forEach(s => s.style.display = 'none');
		};

		// --- GAME LOGIC ---

		function play(key) {
		    if (state.muted) return;
		    sounds[key].currentTime = 0;
		    sounds[key].play().catch(() => {});
		}

		function stopAllSounds() {
		    Object.values(sounds).forEach(s => { s.pause(); s.currentTime = 0; });
		}

		function recordHistory() {
		    history = JSON.parse(JSON.stringify(state));
		}

		function undo() {
		    if (history) {
		        state = history;
		        history = null;
		        saveAndRefresh();
		    }
		}

		function openPotModal() { 
		    play('ding'); 
		    const modal = document.getElementById('pot-modal');
		    const input = document.getElementById('pot-input');
		    
		    modal.style.display = 'flex'; 
		    input.focus(); 

		    // Listen for the Enter key
		    input.onkeydown = function(e) {
		        if (e.key === "Enter") {
		            submitPot();
		        }
		    };
		}

		function closePotModal() { 
		    document.getElementById('pot-modal').style.display = 'none'; 
		    document.getElementById('pot-input').value = ''; 
		}

		function submitPot() {
		    const input = document.getElementById('pot-input');
		    const val = parseInt(input.value);
		    
		    if (!isNaN(val)) { 
		        recordHistory(); 
		        state.pot += val; 
		        saveAndRefresh(); 
		    }
		    closePotModal();
		}

		function transferPot(side) {
		    if (cooldown || state.pot === 0) return;
		    recordHistory();
		    play('roundWin');
		    if (side === 'A') state.scoreA += state.pot; else state.scoreB += state.pot;
		    state.pot = 0; state.strikesA = 0; state.strikesB = 0;
		    startCooldown(); 
		    saveAndRefresh();
		}

		function addStrike(side) {
		    if (cooldown) return;
		    if ((side === 'A' && state.strikesA < 3) || (side === 'B' && state.strikesB < 3)) {
		        recordHistory();
		        if (side === 'A') state.strikesA++; else state.strikesB++;
		        play('strike'); 
		        startCooldown(); 
		        saveAndRefresh();
		    }
		}

		function startCooldown() {
		    cooldown = true; document.body.classList.add('cooldown');
		    setTimeout(() => { cooldown = false; document.body.classList.remove('cooldown'); }, 2000);
		}

		function toggleMute() { 
		    state.muted = !state.muted; 
		    saveAndRefresh(); 
		}

		function fullReset() {
		    if (confirm("Reset everything?")) {
		        state = JSON.parse(JSON.stringify(defaultState));
		        history = null; 
		        saveAndRefresh(); 
		        showScreen('main-screen');
		    }
		}

		// Initial UI Load
		updateUI();
    </script>
</body>
</html>
